server:
  port: 8080

spring:
  application:
    name: finance-tracker-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:finance_tracker}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Raju@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    # In production, override via JWT_SECRET env var with a long random Base64 string
    secret: ${JWT_SECRET:1c1bf352c96482cd258078067432b55a7e5bdc7ea3d9164ea5018eaec7d641a3d05c3ec1c7a71f62cbc4a85980c1a47db68aa9d6f0102666433b44d8828feb80}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.financetracker: INFO
    org.springframework.security: WARN